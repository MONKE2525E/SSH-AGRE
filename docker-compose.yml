version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "31457:31457"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=31457
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SSH_KEY_ENCRYPTION_SECRET=${SSH_KEY_ENCRYPTION_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:27291}
    networks:
      - gemini-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:27291:80"
    environment:
      # The frontend is served via Nginx which proxies /api to the backend,
      # so no explicit API URL is needed in the frontend build.
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - gemini-network
    restart: unless-stopped

networks:
  gemini-network:
    driver: bridge
